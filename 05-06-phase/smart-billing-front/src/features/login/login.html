<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>SmartBilling AI</mat-card-title>
      <mat-card-subtitle>Sign in to your account</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <!-- Email Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" placeholder="dev@smartbilling.com">
          <mat-icon matPrefix>email</mat-icon>
          @if (loginForm.controls.email.errors?.['email']) {
            <mat-error>Please enter a valid email</mat-error>
          }
        </mat-form-field>

        <!-- Password Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix (click)="hidePassword.set(!hidePassword())" type="button">
            <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width login-btn" 
                [disabled]="loginForm.invalid || isLoading()">
          @if (isLoading()) {
            Authenticating...
          } @else {
            Login
          }
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
