<div class="list-container">
  <div class="header-actions">
    <h1>List Contracts</h1>
    <button mat-raised-button color="primary" (click)="onAdd()">
      <mat-icon>add</mat-icon> NEW CONTRACT
    </button>
  </div>

  <div class="mat-elevation-z8 table-responsive">
    <table mat-table [dataSource]="contracts()">

      <!-- Title Column -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef> Contract Title </th>
        <td mat-cell *matCellDef="let element"> {{element.title}} </td>
      </ng-container>

      <!-- Customer Column -->
      <ng-container matColumnDef="customer">
        <th mat-header-cell *matHeaderCellDef> Customer ID </th>
        <td mat-cell *matCellDef="let element"> {{element.customerId}} </td>
      </ng-container>

      <!-- Fee Column -->
      <ng-container matColumnDef="fee">
        <th mat-header-cell *matHeaderCellDef> Monthly Fee </th>
        <td mat-cell *matCellDef="let element"> {{element.monthlyFee | currency:element.currency}} </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let element"> 
          <span class="status-badge" [ngClass]="element.status.toLowerCase()">
            {{element.status}}
          </span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="accent" (click)="onEdit(element)" matTooltip="Edit Contract">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="onDelete(element.id)" matTooltip="Delete Contract">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
