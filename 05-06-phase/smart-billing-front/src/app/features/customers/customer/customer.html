<h2 mat-dialog-title>New Customer</h2>

<mat-dialog-content>
  <form [formGroup]="customerForm" class="flex-column">
    <mat-form-field appearance="outline">
      <mat-label>Full Name</mat-label>
      <input matInput formControlName="nameCustomer">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Taxpayer Indentification </mat-label>
      <input matInput formControlName="taxId">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email">
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>Phone</mat-label>
        <input matInput formControlName="phone">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Address</mat-label>
      <textarea matInput formControlName="address"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button 
          color="primary" 
          [disabled]="customerForm.invalid || isSaving()" 
          (click)="onSave()">Save Customer</button>
</mat-dialog-actions>
