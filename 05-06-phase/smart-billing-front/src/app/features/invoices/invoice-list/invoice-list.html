<div class="list-container">
  <div class="header-actions">
    <h1>Invoices</h1>
    <button mat-raised-button color="primary" (click)="openForm()">
      <mat-icon>add</mat-icon> NEW INVOICE
    </button>
  </div>

  <div class="mat-elevation-z8 table-responsive">
    <table mat-table [dataSource]="invoices()">

      <!-- Number Column -->
      <ng-container matColumnDef="number">
        <th mat-header-cell *matHeaderCellDef> Number </th>
        <td mat-cell *matCellDef="let element"> {{element.invoiceNumber}} </td>
      </ng-container>

      <!-- Amount Column -->
      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef> Total </th>
        <td mat-cell *matCellDef="let element"> {{element.totalAmount | currency}} </td>
      </ng-container>

      <!-- AGREGAR ESTO: Penalty Column (Para que coincida con el ID del TS) -->
      <ng-container matColumnDef="penalty">
        <th mat-header-cell *matHeaderCellDef> Penalty </th>
        <td mat-cell *matCellDef="let element"> {{element.penaltyAmount | currency}} </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let element">
          <span class="status-badge" [ngClass]="element.status.toLowerCase()">
            {{element.status}}
          </span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="accent" (click)="openForm(element)">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    @if (invoices().length === 0) {
      <div class="empty-state">
        <p>No invoices available.</p>
      </div>
    }
  </div>
</div>
