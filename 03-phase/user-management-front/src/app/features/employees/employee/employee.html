<div class="p-4">
  <h2>List of Employees</h2>
  
  @defer (on timer(500ms)) {
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Last Name</th>
          <th>Email</th>
          <th>Action</th></tr>
      </thead>
      <tbody>
        @for (e of employees(); track e.id) {
          <tr>
            <td>{{ e.name }}</td>
            <td>{{ e.lastName }}</td>
            <td>{{ e.email }}</td>
            <td>
              <button (click)="onEdit(e)" class="btn-edit">Update</button>
              <button (click)="onDelete(e.id!)" class="btn-delete">Delete</button>
            </td>
          </tr>
        } @empty {
          <tr><td colspan="3">No employees registered.</td></tr>
        }
      </tbody>
    </table>
  } @placeholder {
    <p>Preparing data view...</p>
  } @loading {
    <p>Loading employees...</p>
  }
</div>
