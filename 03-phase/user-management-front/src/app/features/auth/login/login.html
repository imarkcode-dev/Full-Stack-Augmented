<div class="auth-box">
    <form (submit)="onLogin()">
    <h2>Login</h2>
    <input type="text" [(ngModel)]="loginData.username" name="u" placeholder="User" required>
    <input type="password" [(ngModel)]="loginData.password" name="p" placeholder="Password" required>
    <button type="submit">Ingresar</button>
    </form>
</div>
